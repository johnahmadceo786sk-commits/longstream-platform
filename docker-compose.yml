version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: longstream_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: longstream_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: longstream_backend
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  nginx:
    image: nginx:latest
    container_name: longstream_nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:

  worker:
    build: ./backend
    container_name: longstream_worker
    command: celery -A app.workers.celery_app.celery worker --loglevel=info
    depends_on:
      - backend
      - redis
      - postgres
    env_file:
      - .env